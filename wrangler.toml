name = "elliot-fox"
compatibility_date = "2024-12-01"
main = "worker/index.ts"

[assets]
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# For local dev, create a .dev.vars file with:
# AMBIENT_WEATHER_API_KEY=your_key
# AMBIENT_WEATHER_APPLICATION_KEY=your_key

# For production, use:
# bunx wrangler secret put AMBIENT_WEATHER_API_KEY
# bunx wrangler secret put AMBIENT_WEATHER_APPLICATION_KEY
